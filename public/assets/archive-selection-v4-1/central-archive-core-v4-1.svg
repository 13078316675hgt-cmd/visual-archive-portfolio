<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="58%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="34%" stop-color="#F4F8FA" stop-opacity="0.72"/>
      <stop offset="68%" stop-color="#D9E3EA" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="fineNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- transparent background; this SVG is a foreground/backdrop motif, not a full page background -->
  <g id="central-glow" opacity="0.86">
    <ellipse cx="960" cy="505" rx="430" ry="520" fill="url(#coreGlow)"/>
    <ellipse cx="960" cy="525" rx="260" ry="430" fill="#FFFFFF" opacity="0.24" filter="url(#softBlur)"/>
  </g>

  <!-- abstract white archive figure / landmark silhouette: intentionally non-specific, not a character illustration -->
  <g id="archive-silhouette" opacity="0.86">
    <path d="M960 138 C1012 214 1036 315 1030 410 C1024 532 1090 640 1168 764 C1054 720 1004 662 960 586 C916 662 866 720 752 764 C830 640 896 532 890 410 C884 315 908 214 960 138Z" fill="#FAFCFD" opacity="0.82"/>
    <path d="M960 186 C1008 275 992 363 990 455 C988 556 1038 660 1110 740" stroke="#90A8BA" stroke-width="2" opacity="0.34"/>
    <path d="M960 186 C912 275 928 363 930 455 C932 556 882 660 810 740" stroke="#90A8BA" stroke-width="2" opacity="0.34"/>
    <path d="M960 250 V820" stroke="#6C8BA4" stroke-width="1.4" opacity="0.38"/>
  </g>

  <!-- wing / broadcast structure lines -->
  <g id="radiating-structure" stroke="#B7C7D3" stroke-width="1.2" opacity="0.58">
    <path d="M904 292 C760 330 646 420 560 528"/>
    <path d="M1016 292 C1160 330 1274 420 1360 528"/>
    <path d="M910 374 C750 410 620 485 482 628"/>
    <path d="M1010 374 C1170 410 1300 485 1438 628"/>
    <path d="M890 455 C742 500 610 590 520 700"/>
    <path d="M1030 455 C1178 500 1310 590 1400 700"/>
  </g>

  <!-- dark structural fragments like the video, but kept separated from windows -->
  <g id="dark-fragments" opacity="0.78">
    <rect x="790" y="662" width="78" height="146" fill="#14191F" opacity="0.42"/>
    <rect x="1050" y="650" width="96" height="170" fill="#14191F" opacity="0.36"/>
    <rect x="878" y="754" width="190" height="76" fill="#14191F" opacity="0.32"/>
    <rect x="690" y="565" width="48" height="112" fill="#14191F" opacity="0.20"/>
    <rect x="1198" y="565" width="56" height="120" fill="#14191F" opacity="0.20"/>
  </g>

  <!-- blue structure blocks -->
  <g id="blue-structure" fill="#1268F4" opacity="0.28">
    <rect x="706" y="426" width="18" height="72"/>
    <rect x="1196" y="410" width="18" height="88"/>
    <rect x="880" y="840" width="160" height="9"/>
    <rect x="930" y="292" width="60" height="4"/>
  </g>

  <!-- red/purple energy accents; use sparingly -->
  <g id="energy-accents">
    <circle cx="960" cy="526" r="5" fill="#FF4A72" opacity="0.85"/>
    <circle cx="944" cy="548" r="2.5" fill="#8D6CFF" opacity="0.75"/>
    <circle cx="980" cy="546" r="2.5" fill="#8D6CFF" opacity="0.75"/>
  </g>

  <!-- subtle circular datum around the core -->
  <g id="core-datum" stroke="#1268F4" opacity="0.24">
    <circle cx="960" cy="520" r="260" stroke-width="1"/>
    <path d="M960 230V810M670 520H1250" stroke-width="1"/>
    <path d="M1138 330A260 260 0 0 1 1218 550" stroke-width="2"/>
    <path d="M782 710A260 260 0 0 1 702 490" stroke-width="2"/>
  </g>

  <!-- noise overlay inside core silhouette only -->
  <rect x="640" y="140" width="640" height="760" filter="url(#fineNoise)" opacity="0.35"/>
</svg>