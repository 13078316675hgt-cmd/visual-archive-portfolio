<svg xmlns="http://www.w3.org/2000/svg" width="280" height="160" viewBox="0 0 280 160" fill="none">
  <defs>
    <radialGradient id="bluePulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1268F4" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#1268F4" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#1268F4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3F6D" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#8D6CFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8D6CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <symbol id="blue-energy-dot" viewBox="-40 -40 80 80">
    <circle cx="0" cy="0" r="38" fill="url(#bluePulse)"/>
    <circle cx="0" cy="0" r="4" fill="#1268F4"/>
  </symbol>
  <symbol id="red-violet-dot" viewBox="-35 -35 70 70">
    <circle cx="0" cy="0" r="33" fill="url(#redPulse)"/>
    <circle cx="0" cy="0" r="3.5" fill="#FF3F6D"/>
  </symbol>
  <g transform="translate(70 80)"><use href="#blue-energy-dot"/></g>
  <g transform="translate(190 80)"><use href="#red-violet-dot"/></g>
</svg>