<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <radialGradient id="coreHalo" cx="50%" cy="46%" r="50%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="0.34" stop-color="#F8FBFF" stop-opacity="0.92"/>
      <stop offset="0.62" stop-color="#D7E4EC" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#D7E4EC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="backDark" cx="50%" cy="54%" r="58%">
      <stop offset="0" stop-color="#0E151B" stop-opacity="0.30"/>
      <stop offset="0.42" stop-color="#0E151B" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0E151B" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="2" seed="97"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.11"/></feComponentTransfer>
    </filter>
  </defs>

  <!-- local backing so the white motif does not disappear on pale UI -->
  <ellipse cx="960" cy="560" rx="520" ry="520" fill="url(#backDark)"/>
  <ellipse cx="960" cy="510" rx="410" ry="520" fill="url(#coreHalo)"/>

  <!-- faceless central archive subject: more organic and tall than v4.3, still abstract -->
  <g id="white-archive-emblem" opacity="0.98">
    <path d="M960 80
      C1026 180 1060 294 1048 410
      C1038 506 1088 610 1168 724
      C1210 784 1248 840 1306 914
      C1182 864 1086 790 1024 684
      C992 630 974 584 960 536
      C946 584 928 630 896 684
      C834 790 738 864 614 914
      C672 840 710 784 752 724
      C832 610 882 506 872 410
      C860 294 894 180 960 80Z"
      fill="#FFFFFF" opacity="0.94"/>
    <path d="M960 126 C1002 242 1006 358 994 472 C982 582 1016 698 1088 848"
      stroke="#5F7D95" stroke-width="2.5" opacity="0.48"/>
    <path d="M960 126 C918 242 914 358 926 472 C938 582 904 698 832 848"
      stroke="#5F7D95" stroke-width="2.5" opacity="0.48"/>
    <path d="M960 152V884" stroke="#4B6D86" stroke-width="2" opacity="0.50"/>
    <path d="M880 270 C822 314 786 392 766 490 C742 610 700 738 636 848"
      stroke="#8DA8BA" stroke-width="1.7" opacity="0.38"/>
    <path d="M1040 270 C1098 314 1134 392 1154 490 C1178 610 1220 738 1284 848"
      stroke="#8DA8BA" stroke-width="1.7" opacity="0.38"/>
    <path d="M908 220 C824 248 744 294 670 358" stroke="#B4C5D0" stroke-width="1.3" opacity="0.55"/>
    <path d="M1012 220 C1096 248 1176 294 1250 358" stroke="#B4C5D0" stroke-width="1.3" opacity="0.55"/>
  </g>

  <!-- central vertical spire / robe structure -->
  <g id="inner-spire">
    <path d="M960 302 L1006 802 H914 Z" fill="#FFFFFF" opacity="0.44"/>
    <path d="M960 302 L1006 802 H914 Z" stroke="#1268F4" stroke-opacity="0.18" stroke-width="1.4"/>
    <path d="M920 520H1000M905 638H1015M890 760H1030" stroke="#6E8DA4" stroke-width="1.2" opacity="0.28"/>
  </g>

  <!-- black structural blocks below, like video UI chunks, but not labels -->
  <g id="core-black-structure" fill="#0E1318">
    <rect x="748" y="606" width="92" height="190" opacity="0.50"/>
    <rect x="1080" y="600" width="116" height="204" opacity="0.48"/>
    <rect x="840" y="754" width="260" height="92" opacity="0.44"/>
    <rect x="664" y="522" width="64" height="132" opacity="0.24"/>
    <rect x="1210" y="522" width="70" height="138" opacity="0.24"/>
  </g>

  <!-- radial construction lines -->
  <g id="core-radials" stroke="#1268F4" opacity="0.30">
    <circle cx="960" cy="528" r="292" stroke-width="1.3"/>
    <circle cx="960" cy="528" r="138" stroke-width="1" opacity="0.45"/>
    <path d="M960 188V888M608 528H1312" stroke-width="1.2"/>
    <path d="M760 322A292 292 0 0 1 1160 322" stroke-width="2"/>
    <path d="M760 734A292 292 0 0 0 1160 734" stroke-width="2"/>
  </g>

  <!-- small accent points -->
  <g id="core-accents">
    <circle cx="960" cy="530" r="5.5" fill="#FF3F6D" opacity="0.95"/>
    <circle cx="936" cy="560" r="3" fill="#8D6CFF" opacity="0.85"/>
    <circle cx="986" cy="560" r="3" fill="#8D6CFF" opacity="0.85"/>
    <circle cx="960" cy="674" r="4.5" fill="#1268F4" opacity="0.82"/>
  </g>

  <rect x="590" y="90" width="740" height="860" filter="url(#grain)" opacity="0.30"/>
</svg>